<div class="row">
  <div class="col-8">
    <div class="card">
      <div class="card-header bg-success">
        <h6>Employee List</h6>
      </div>
      <div class="card-body">      
      <div class="row">
          <div class="col-12">
            <table class="table table-bordered">
              <thead>
                <tr>
                  <th>Sr No</th>
                  <th>Name</th>
                  <th>Contact No</th>
                  <th>Email Id</th>
                </tr>
              </thead> 
            </table>
          </div>
        </div>    
      </div>
    </div>
  </div>
  <div class="col-4">
    <div class="card">
      <div class="card-header bg-success">
        New Employee
      </div>
      <div class="card-body">
         <form [formGroup]="employeeForm">
         <div class="row">
          <div class="col-12">
            <label for="">Name</label>
            <input type="text" formControlName="name" class="form-control"/>
          </div>
             <div class="col-6">
            <label for="">Email Id</label>
            <input type="text" formControlName="emailId" class="form-control"/>
          </div>
             <div class="col-6">
            <label for="">Contact No</label>
            <input type="text" formControlName="contactNo" class="form-control"/>
          </div>
             <div class="col-6">
            <label for="">City</label>
            <input type="text" formControlName="city" class="form-control"/>
          </div>
             <div class="col-6">
            <label for="">State</label>
            <input type="text" formControlName="state" class="form-control"/>
          </div>
             <div class="col-6">
            <label for="">Pin Code</label>
            <input type="text" formControlName="pinCode" class="form-control"/>
          </div>
              <div class="col-12">
            <label for="">Address</label>
            <textarea type="text" formControlName="address" class="form-control"></textarea>
          </div>
            </div>
         </form>    
          <div class="row">
            <div class="col-6 text-center pt-3">
              <button class="btn btn-secondary">
                Reset
              </button>  
            </div>
              <div class="col-6 text-center pt-3">
              <button class="btn btn-success" (click)="onSave()">
                Save Employee
              </button>  
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
